vars:
  PROJECT_A: ""
  PROJECT_B: ""

defaults:
  capture: false
  annotated: false
  events: 10
  retries: 0
  retryDelayMs: 100

steps:
  - name: select-project-a
    type: semanticAction
    action: selectProjectByName
    value: "${PROJECT_A}"
    wait:
      projectName: "${PROJECT_A}"

  - name: select-project-b
    type: semanticAction
    action: selectProjectByName
    value: "${PROJECT_B}"
    wait:
      projectName: "${PROJECT_B}"

  - name: select-project-a-again
    type: semanticAction
    action: selectProjectByName
    value: "${PROJECT_A}"
    wait:
      projectName: "${PROJECT_A}"
